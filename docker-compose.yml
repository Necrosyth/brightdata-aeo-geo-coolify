version: "3.8"
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: geo-aeo-tracker
    depends_on:
      - db
    ports:
      - "3040:3040"
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - OPENCODE_ZEN_API_KEY
      - NVIDIA_API_KEY
      - GEMINI_API_KEY
      - BRIGHT_DATA_KEY
      - BRIGHT_DATA_DATASET_CHATGPT
      - BRIGHT_DATA_DATASET_PERPLEXITY
      - BRIGHT_DATA_DATASET_COPILOT
      - BRIGHT_DATA_DATASET_GEMINI
      - BRIGHT_DATA_DATASET_GOOGLE_AI
      - BRIGHT_DATA_DATASET_GROK
      - DATABASE_URL=postgresql://legaluser:legalpass@db:5432/llm_tracker
      - DASHBOARD_USERNAME
      - DASHBOARD_PASSWORD
      - AUTH_SECRET
      - CRON_SECRET
      - NEXT_PUBLIC_DEMO_ONLY
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:15-alpine
    container_name: geo-aeo-tracker-db
    environment:
      POSTGRES_USER: legaluser
      POSTGRES_PASSWORD: legalpass
      POSTGRES_DB: llm_tracker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
